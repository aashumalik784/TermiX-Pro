name: Build TermiX-Pro APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission
      run: chmod +x gradlew
    
    - name: Build with Gradle
      run: ./gradlew assembleDebug
    
    - name: List APK files
      run: |
        echo "Searching for APK files..."
        find . -name "*.apk" -type f
        ls -lh app/build/outputs/apk/debug/ || echo "Debug APK not found"
        ls -lh app/build/outputs/apk/release/ || echo "Release APK not found"
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: TermiX-Pro-APK
        path: app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: error
        retention-days: 30
